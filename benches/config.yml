rng_seed: 0
total_tags_count: 100
object_tags_count: 10
objects_count: 100000
benchmark_in_memory: true
benchmark_on_disk: true
index:
  maintain_only_tag_and_object_table: false
  database:
    log:
      path: /tmp/dream/benchmark/log.dat
      checkpoint_on_size: 8 GB
    schemas:
      public:
        tag_and_object:
          index:
            path: /tmp/dream/benchmark/tables/tag_and_object/index.idx
          data_pool:
            fixed:
              path: /tmp/dream/benchmark/tables/tag_and_object/data.dat
              container_size: 32
        object_and_tag:
          index:
            path: /tmp/dream/benchmark/tables/object_and_tag/index.idx
          data_pool:
            fixed:
              path: /tmp/dream/benchmark/tables/object_and_tag/data.dat
              container_size: 32
        object:
          index:
            path: /tmp/dream/benchmark/tables/object_to_tags_count/index.idx
          data_pool:
            fixed:
              path: /tmp/dream/benchmark/tables/object_to_tags_count/data.dat
              container_size: 16
